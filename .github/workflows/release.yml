name: Release CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: |
            Version to release (for example: 0.6.13)
        required: true
        type: string
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  checks: write
  pull-requests: write
  statuses: write

jobs:
  test:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/test.yml

  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Ensure release starts from develop
        run: |
          if [[ "${GITHUB_REF_NAME}" != "develop" ]]; then
            echo "Release workflow must be triggered from the develop branch."
            echo "Current branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Update version and changelog
        run: uv run python scripts/release.py --package-name highdra --target-version "${{ inputs.version }}"

      - name: Verify release updated files
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No release changes were produced."
            exit 1
          fi

      - name: Ensure release tag does not already exist
        run: |
          tag="v${{ inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists on origin."
            exit 1
          fi

      - name: Commit release artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git checkout -B develop origin/develop
          git add pyproject.toml uv.lock CHANGELOG.md
          git commit -m "chore(release): Release to v${{ inputs.version }}"

      - name: Push release commit to develop
        run: git push origin HEAD:develop

      - name: Create release pull request to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ inputs.version }}"
          title="Release to v${version}"
          cat > pr-body.md <<EOF
          Automated release PR for ${version}.

          Latest delelopment changes from develop will be merged into main, and the following release artifacts will be included:

          - Updates pyproject.toml
          - Updates uv.lock
          - Updates CHANGELOG.md
          EOF

          existing_pr_number="$(gh pr list --base main --head develop --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$existing_pr_number" ]]; then
            echo "Release PR already exists: #${existing_pr_number}"
            exit 0
          fi

          gh pr create \
            --base main \
            --head develop \
            --title "$title" \
            --body-file pr-body.md

  publish_release:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Release to v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          if [[ -z "$version" ]]; then
            echo "Could not determine project version from pyproject.toml"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag does not already exist
        run: |
          tag="v${{ steps.version.outputs.value }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists on origin."
            exit 1
          fi

      - name: Create and push tag
        run: |
          tag="v${{ steps.version.outputs.value }}"
          git tag "$tag"
          git push origin "$tag"

      - name: Build release notes from changelog
        run: |
          version="${{ steps.version.outputs.value }}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" {in_section=1; print; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "Could not find changelog entry for version ${version}."
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.value }}
          body_path: release-notes.md
          generate_release_notes: true

      - name: Update tag latest to point to new release
        run: |
          git tag -f latest
          git push origin latest --force
