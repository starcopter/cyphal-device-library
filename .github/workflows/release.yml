name: Release CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: |
            Version to release (for example: 0.6.13)
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Update version and changelog
        run: uv run python scripts/release.py --target-version "${{ inputs.version }}"

      - name: Verify release updated files
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No release changes were produced."
            exit 1
          fi

      - name: Commit release artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock CHANGELOG.md
          git commit -m "chore(release): ${{ inputs.version }}"

      - name: Tag and push
        run: |
          git tag "v${{ inputs.version }}"
          git push origin HEAD
          git push origin "v${{ inputs.version }}"
